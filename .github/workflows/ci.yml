name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test with PostgreSQL
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine

        env:
          POSTGRES_DB: fastapi_auth_test
          POSTGRES_USER: fastapi_user
          POSTGRES_PASSWORD: test_password

        ports:
          - 5432:5432

        options: >-
          --health-cmd "pg_isready -U fastapi_user -d fastapi_auth_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_NAME: FastAPI Authentication API
      ENVIRONMENT: test

      DATABASE_URL: postgresql+psycopg2://fastapi_user:test_password@localhost:5432/fastapi_auth_test

      SECRET_KEY: ci-only-secret-key-that-is-at-least-32-characters-long

      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7

      SMTP_HOST: smtp.example.com
      SMTP_PORT: 587
      SMTP_USERNAME: test@example.com
      SMTP_PASSWORD: ci-test-password
      SMTP_FROM_EMAIL: test@example.com
      SMTP_FROM_NAME: FastAPI Authentication API

      FRONTEND_URL: http://localhost:3000

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run database migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest tests -v

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fastapi-auth-api:ci .