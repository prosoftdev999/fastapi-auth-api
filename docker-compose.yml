services:
  db:
    image: postgres:17-alpine
    container_name: fastapi-auth-postgres

    environment:
      POSTGRES_DB: fastapi_auth
      POSTGRES_USER: fastapi_user
      POSTGRES_PASSWORD: fastapi_password

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U fastapi_user -d fastapi_auth",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: fastapi-auth-api

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql+psycopg2://fastapi_user:fastapi_password@db:5432/fastapi_auth

    depends_on:
      db:
        condition: service_healthy

    restart: unless-stopped

volumes:
  postgres_data: