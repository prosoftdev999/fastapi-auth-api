services:
  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: fastapi-auth-api

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      DATABASE_URL: sqlite:////app/data/fastapi_auth.db

    volumes:
      - sqlite_data:/app/data

    restart: unless-stopped

volumes:
  sqlite_data: