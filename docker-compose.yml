services:
  db:
    image: postgres:17-alpine
    container_name: fastapi-auth-postgres

    environment:
      POSTGRES_DB: fastapi_auth
      POSTGRES_USER: fastapi_user
      POSTGRES_PASSWORD: fastapi_password

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U fastapi_user -d fastapi_auth",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: fastapi-auth-redis

    ports:
      - "6380:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

    restart: unless-stopped

  # S3-compatible object storage for local dev (file uploads feature).
  # Console at http://localhost:9001 (login: minioadmin / minioadmin).
  minio:
    image: minio/minio:latest
    container_name: fastapi-auth-minio

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data

    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: fastapi-auth-api

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql+psycopg2://fastapi_user:fastapi_password@db:5432/fastapi_auth
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET_NAME: fastapi-auth-uploads
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: fastapi-auth-celery-worker

    command: celery -A app.core.celery_app worker --loglevel=info

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql+psycopg2://fastapi_user:fastapi_password@db:5432/fastapi_auth
      REDIS_URL: redis://redis:6379/0

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: fastapi-auth-celery-beat

    command: celery -A app.core.celery_app beat --loglevel=info

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql+psycopg2://fastapi_user:fastapi_password@db:5432/fastapi_auth
      REDIS_URL: redis://redis:6379/0

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    restart: unless-stopped

volumes:
  postgres_data:
  minio_data: